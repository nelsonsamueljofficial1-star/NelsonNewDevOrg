<template>
    <lightning-card>
        <h1 class="slds-text-heading_large slds-text-align_center">Related Contact Details</h1>
        <template lwc:if={bolHasContacts}>
            <div class="slds-scrollable slds-m-around_medium">
                <table
                    class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered slds-max-medium-table_stacked-horizontal">

                    <!-- Header -->
                    <thead>
                        <tr>
                            <th>Serial No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Title</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <!-- Body Data -->
                    <tbody>
                        <template for:each={lstContacts} for:item="data" for:index="index">
                            <tr key={data.Id}>
                                <td>{index+1}</td>
                                <td>{data.Name}</td>
                                <td>{data.Email}</td>
                                <td>{data.Phone}</td>
                                <td>{data.Title}</td>
                                <td><lightning-button label="Delete" name="Delete" variant="destructive"
                                        onclick={actionHandler} data-id={data.Id}></lightning-button></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
        <template lwc:else>
            <h1 class="slds-text-heading_large slds-text-align_center">No Contacts found for this Account.</h1>
        </template>
    </lightning-card>

</template>
