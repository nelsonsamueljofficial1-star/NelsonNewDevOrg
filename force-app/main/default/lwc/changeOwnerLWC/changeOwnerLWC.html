<!--
* Purpose: This Html file is used to show change owner UI in Account record action page
* Created By: Nelson Samuel J
* Created On: 10-06-2026
-->
<template>
    <lightning-card>

        <!-- Header  -->
        <h1 class="slds-text-heading_medium slds-text-align_center"
            style="color: black; padding: 5px; font-weight: bold;">Change Account Owner</h1>
        <hr style="margin: 8px 0px;" />

        <!-- All Input Fields  -->
        <div style="padding: 5px 15px; padding-top: 0px;">
            <lightning-combobox name="ownerPicklist" label="New Owner" placeholder="Choose a User"
                options={lstUserOptions} onchange={handleChange} required>
            </lightning-combobox>
        </div>
        <div style="padding: 5px;">
            <lightning-layout multiple-rows>
                <lightning-layout-item size="11">
                    <lightning-input type="checkbox" label="Transfer Related Contacts" name="Contacts"
                        onchange={handleChange}></lightning-input>
                    <lightning-input type="checkbox" label="Transfer Related Opportunies" name="Opportunities"
                        onchange={handleChange}></lightning-input>
                    <lightning-input type="checkbox" label="Transfer Related Cases" name="Cases"
                        onchange={handleChange}></lightning-input>
                    <lightning-input type="checkbox" label="Notify New Owner via Email" name="Email"
                        onchange={handleChange}
                        field-level-help="Used to send an email to the new Owner with details of the changes."></lightning-input>

                </lightning-layout-item>
                <lightning-layout-item size="1">
                    <h2 style="margin: 5px 0px; color: black; ">({intContact})</h2>
                    <h2 style="margin: 5px 0px; color: black;">({intOpportunity})</h2>
                    <h2 style="margin: 5px 0px; color: black; ">({intCase})</h2>
                </lightning-layout-item>
            </lightning-layout>

            <!-- Buttons  -->
            <div style="display: flex; justify-content: right; gap: 5px; padding: 10px;">
                <lightning-button variant="neutral" label="Cancel" name="Cancel" onclick={handleClick}></lightning-button>
                <lightning-button variant="brand" label="Change Owner" name="ChangeOwner"
                    onclick={handleClick}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
