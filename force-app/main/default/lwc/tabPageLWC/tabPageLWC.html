<template>
    <lightning-card>
        <lightning-layout multiple-rows>

            <!-- Row 1 -->
            <lightning-layout-item size="2" class="blue-bg">
                <h3>Opportunity Name</h3>
            </lightning-layout-item>
            <lightning-layout-item size="7" class="white-bg">
                <h3>Testing CRP & GRP Mismatch</h3>
            </lightning-layout-item>
            <lightning-layout-item size="1" class="blue-bg">
                <h3>Station</h3>
            </lightning-layout-item>
            <lightning-layout-item size="2" class="white-bg">
                <h3>Rewind</h3>
            </lightning-layout-item>

            <!-- Row 2 -->
            <lightning-layout-item size="12" style="margin-top: 5px;">
                <lightning-tabset active-tab-value="Submission Header">
                    <lightning-tab label="Flighting">
                        Content for tab 1 </lightning-tab>
                    <lightning-tab label="Submission Header" value="Submission Header" style="margin-top: 20px;">
                        <div class="flex-align">

                            <!-- Table 1 -->
                            <div class="table">
                                <lightning-layout multiple-rows>

                                    <!-- Row 2.1.1 -->
                                    <lightning-layout-item size="5" class="table-1-bg">
                                        <label>Submission Number</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="Submission Number"
                                            value="CHZ-01205">
                                        </lightning-input>
                                    </lightning-layout-item>

                                    <!-- Row 2.1.2 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 1px;">
                                        <label>Market</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="Market" value="AUD TC">
                                        </lightning-input>
                                    </lightning-layout-item>

                                    <!-- Row 2.1.3 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>SpotLength</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="SpotLength" style="width: 90%;" value="30 Reg"
                                            placeholder="30 Reg">
                                        </lightning-combobox>
                                    </lightning-layout-item>

                                    <!-- Row 2.1.4 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>Spot Factor</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="SSpot Factor" value="1">
                                        </lightning-input>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>

                            <!-- Table 2 -->
                            <div class="table">
                                <lightning-layout multiple-rows>

                                    <!-- Row 2.2.1 -->
                                    <lightning-layout-item size="5" class="table-1-bg">
                                        <label>Station</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="Station" value="Rewind">
                                        </lightning-input>
                                    </lightning-layout-item>

                                    <!-- Row 2.2.2 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 1px;">
                                        <label>Customer</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="Customer"
                                            value="Plug Media iNc">
                                        </lightning-input>
                                    </lightning-layout-item>

                                    <!-- Row 2.2.3 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>Rate Card</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="Rate Card" style="width: 90%;" value="WN 21"
                                            placeholder="WN 21">
                                        </lightning-combobox>
                                    </lightning-layout-item>

                                    <!-- Row 2.2.4 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>Ratings Book</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="Rate Book" style="width: 90%;"
                                            value="WN 21 Projection" placeholder="WN 21 Projection">
                                        </lightning-combobox>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>

                            <!-- Table 3 -->
                            <div class="table">
                                <lightning-layout multiple-rows>

                                    <!-- Row 2.3.1 -->
                                    <lightning-layout-item size="5" class="table-1-bg">
                                        <label>Period</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-input type="text" style="width: 90%;" name="Period"
                                            value="01/06/2026 x 5">
                                        </lightning-input>
                                    </lightning-layout-item>

                                    <!-- Row 2.3.2 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 1px;">
                                        <label>Demo</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="Demo" style="width: 90%;" value="A2554"
                                            placeholder="A2554">
                                        </lightning-combobox>
                                    </lightning-layout-item>

                                    <!-- Row 2.3.3 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>Coverage</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="Coverage" style="width: 90%;" value="All Markets list"
                                            placeholder="All Markets list">
                                        </lightning-combobox>
                                    </lightning-layout-item>

                                    <!-- Row 2.2.4 -->
                                    <lightning-layout-item size="5" class="table-1-bg" style="margin-top: 2px;">
                                        <label>Contra</label>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="7" class="table-2-bg">
                                        <lightning-combobox name="Contra" style="width: 90%;"
                                            value="Cash" placeholder="Cash">
                                        </lightning-combobox>
                                    </lightning-layout-item>
                                </lightning-layout>
                            </div>

                        </div>
                        <lightning-layout-item size="12" style="margin-top: 3px;" class="align-vCenter">
                            <lightning-button label="🖫 Save" variant="brand" class="save-btn" onclick={showData}></lightning-button>
                        </lightning-layout-item>
                    </lightning-tab>
                    <lightning-tab label="Markets+Demos">
                        Content for tab 1
                    </lightning-tab>
                    <lightning-tab label="Add Programs">
                        Content for tab 1
                    </lightning-tab>
                    <lightning-tab label="Add Creative Services">
                        Content for tab 1
                    </lightning-tab>
                    <lightning-tab label="Add Owned Digital Products">
                        Content for tab 1
                    </lightning-tab>
                </lightning-tabset>
            </lightning-layout-item>
        </lightning-layout>
    </lightning-card>
</template>
