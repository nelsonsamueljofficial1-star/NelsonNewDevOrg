<!-- * Purpose: This Html file is used to show the hierarchical relationship between records in a grandparent-child relationship
     * Created By: Nelson Samuel J
     * Created On: 02-06-2026
-->
<template>
    <lightning-card>
        <div class="slds-p-around_xx-small">
            <div class="slds-m-left_x-small slds-m-bottom_x-small">
                <h1 class="slds-text-heading_medium">Grand Parent</h1>
            </div>
            <p>{intValue} of 3 children selected</p>
            <lightning-button label="Reset" onclick={handleReset} variant="success"></lightning-button>
            <c-parent-hierarchical-management obj-chil-datas-api={objChildDatas}
                onsenddatatograndparent={handleParentData}></c-parent-hierarchical-management>
        </div>
    </lightning-card>
</template>
