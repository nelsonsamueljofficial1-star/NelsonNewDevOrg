<template>
    <div style=" background-color: white; border-radius: 5px; border: 2px solid black;">
        <div class="align-center">
            <lightning-button variant="destructive" label="Cancel" title="Cancel" onclick={handleCancel}>
            </lightning-button>
            <lightning-button variant="success" label="Open popup" title="Open popup" onclick={showModalBox}>
            </lightning-button>
        </div>

        <!-- Open Popup -->
        <template if:true={isShowModal}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <!-- modal header start -->
                    <header class="slds-modal__header" style="text-align: center;">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={hideModalBox}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" variant="error"
                                size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Owned Digital</h2>
                    </header>

                    <!-- modal body start -->
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">

                        <!-- Create multiple rows -->
                        <lightning-layout multiple-rows>

                            <!-- Row 1 -->
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-input type="text" name="Product Name" label="Product Name" required>
                                </lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-combobox name="Rate Category" label="Rate Category"
                                    placeholder="Select an Option" options={rateCategoryOptions} required>
                                </lightning-combobox>
                            </lightning-layout-item>

                            <!-- Row 2 -->
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-combobox name="Platform" label="Platform" placeholder="Select an Option"
                                    options={platformOptions} required>
                                </lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-input type="Currency" name="Unit Price" label="Unit Price ($)" required>
                                </lightning-input>
                            </lightning-layout-item>

                            <!-- Row 3 -->
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-combobox name="Add Type" label="Add Type" placeholder="Select an Option"
                                    options={adTypeOptions} required>
                                </lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-input type="Number" name="Quantity" label="Quantity" required>
                                </lightning-input>
                            </lightning-layout-item>

                            <!-- Row 4 -->
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-combobox name="Unit Type" label="Unit Type" placeholder="Select an Option"
                                    options={unitTypeOptions} required>
                                </lightning-combobox>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>

                    <!-- modal footer start-->
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" variant="Neutral" style="--slds-c-button-radius-border: 2px;"
                            class="slds-m-right_small" onclick={hideModalBox}></lightning-button>
                        <lightning-button label="Add" variant="Brand" style="--slds-c-button-radius-border: 2px;"
                            onclick={handleData}></lightning-button>
                    </footer>

                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>

        </template>

        <template lwc:if={Table1.length}>
            <h1 class="slds-text-heading_large slds-text-align_center">Table 1</h1>
            <lightning-datatable key-field="id" data={Table1} columns={Table1Columns}
                onrowselection={handleRowSelectionTable1}>
            </lightning-datatable>
            <div class="align-center">
                <lightning-button label="Add Cart" variant="success" class="save-btn"
                    onclick={showData}></lightning-button>
            </div>
        </template>
        <template lwc:if={Table2.length}>
            <h1 class="slds-text-heading_large slds-text-align_center">Table 2</h1>
            <lightning-datatable key-field="id" data={Table2} columns={Table2Columns}
                onrowaction={handleRowActionTable2} hide-checkbox-column="true">
            </lightning-datatable>
        </template>
    </div>
</template>
